version: '3.8'

services:
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      # Use mysql_native_password for broader client compatibility
      MYSQL_INITDB_ARGS: --default-authentication-plugin=mysql_native_password
    ports:
      - "3306:3306"
    volumes:
      # Automatic database initialization
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
      # Data persistence
      - db_data:/var/lib/mysql

volumes:
  db_data: