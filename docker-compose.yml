version: '3.8'

services:
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      # Initialisation automatique de la base de données
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
      # Persistance des données
      - db_data:/var/lib/mysql

volumes:
  db_data: